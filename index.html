<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Checklist Padaria</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#F1EFE8;color:#1A1A1A;min-height:100vh;}
.app{max-width:600px;margin:0 auto;padding:1rem;}
.loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid #ddd;border-top-color:#BA7517;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.card{background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:2rem;width:100%;max-width:380px;}
.logo{text-align:center;margin-bottom:1.5rem;}
.logo h1{font-size:22px;font-weight:700;}
.logo p{font-size:13px;color:#666;margin-top:4px;}
.field{margin-bottom:1rem;}
.field label{font-size:12px;color:#666;display:block;margin-bottom:5px;font-weight:500;}
.field input,.field select{width:100%;padding:10px 12px;border:1px solid #ccc;border-radius:8px;font-size:15px;background:#fff;}
.btn{width:100%;padding:12px;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;border:none;margin-top:4px;}
.btn-amber{background:#FAEEDA;color:#633806;border:1px solid #BA7517;}
.btn-gray{background:#fff;color:#666;border:1px solid #ccc;margin-top:8px;}
.err{font-size:12px;color:#A32D2D;margin-top:8px;text-align:center;min-height:18px;}
.divider{display:flex;align-items:center;gap:10px;margin:1.25rem 0 1rem;}
.divider span{font-size:11px;color:#999;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e0e0d8;}
.header{display:flex;align-items:center;justify-content:space-between;padding:1rem 0;border-bottom:1px solid #e0e0d8;margin-bottom:1.25rem;}
.header h2{font-size:20px;font-weight:700;}
.header p{font-size:12px;color:#666;}
.header-right{display:flex;align-items:center;gap:8px;}
.pill{font-size:12px;background:#FAEEDA;color:#633806;padding:4px 10px;border-radius:20px;font-weight:500;}
.dot{width:8px;height:8px;border-radius:50%;background:#3B6D11;}
.dot.off{background:#A32D2D;}
.dot.sync{background:#BA7517;}
.btn-sm{padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;background:#fff;color:#666;border:1px solid #ccc;}
.tabs{display:flex;gap:6px;margin-bottom:1.25rem;overflow-x:auto;}
.tab{padding:7px 15px;border-radius:8px;border:1px solid #ccc;background:#fff;font-size:13px;color:#666;cursor:pointer;}
.tab.on{background:#FAEEDA;border-color:#BA7517;color:#633806;font-weight:500;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;}
.scard{background:#f5f5f0;border-radius:8px;padding:.875rem 1rem;}
.scard .sl{font-size:11px;color:#666;}
.scard .sv{font-size:22px;font-weight:600;}
.rbar{background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.rbar h3{font-size:14px;font-weight:500;}
.rbar p{font-size:12px;color:#666;}
.btn-pdf{padding:9px 18px;border-radius:8px;border:1px solid #BA7517;background:#FAEEDA;color:#633806;font-size:13px;font-weight:500;cursor:pointer;}
.sstore{background:#fff;border:1px solid #e0e0d8;border-radius:12px;margin-bottom:8px;overflow:hidden;}
.sstore-h{display:flex;align-items:center;gap:12px;padding:12px 1rem;cursor:pointer;}
.av{width:36px;height:36px;border-radius:50%;background:#FAEEDA;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#633806;}
.si{flex:1;}
.sn{font-size:14px;font-weight:500;}
.ss{font-size:12px;color:#666;}
.badges{display:flex;gap:6px;align-items:center;}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;}
.b-done{background:#EAF3DE;color:#3B6D11;}
.b-part{background:#FAEEDA;color:#633806;}
.b-none{background:#f0f0eb;color:#666;}
.sstore-d{display:none;border-top:1px solid #e0e0d8;padding:12px 1rem;}
.sstore-d.op{display:block;}
.drow{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.dt{font-size:13px;color:#666;}
.mbar{display:flex;align-items:center;gap:8px;}
.mt{width:80px;height:4px;background:#e0e0d8;border-radius:2px;overflow:hidden;}
.mf{height:100%;}
.mf-g{background:#3B6D11;}
.mf-a{background:#BA7517;}
.mp{font-size:12px;color:#666;min-width:30px;text-align:right;}
.prog{background:#f5f5f0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem;border:1px solid #e0e0d8;}
.prog-top{display:flex;justify-content:space-between;margin-bottom:8px;}
.prog-l{font-size:13px;color:#666;}
.prog-n{font-size:15px;font-weight:500;}
.ptrack{height:6px;background:#e0e0d8;border-radius:3px;overflow:hidden;}
.pfill{height:100%;background:#BA7517;border-radius:3px;}
.pfill.done{background:#3B6D11;}
.sec{margin-bottom:1.5rem;}
.sec-t{font-size:11px;color:#666;font-weight:500;text-transform:uppercase;margin-bottom:8px;}
.item{display:flex;gap:12px;padding:12px 1rem;background:#fff;border:1px solid #e0e0d8;border-radius:8px;margin-bottom:6px;cursor:pointer;}
.item.chk{background:#EAF3DE;border-color:#C0DD97;}
.item.chk .it{color:#666;text-decoration:line-through;}
.cb2{width:22px;height:22px;border-radius:5px;border:1.5px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;margin-top:1px;}
.item.chk .cb2{background:#3B6D11;border-color:#3B6D11;}
.ci{width:11px;height:11px;display:none;}
.item.chk .ci{display:block;}
.ci::before{content:'';display:block;width:11px;height:11px;background:white;clip-path:polygon(14% 44%,0 65%,50% 100%,100% 16%,80% 0%,43% 62%);}
.ib{flex:1;}
.it{font-size:14px;line-height:1.4;}
.iw{font-size:11px;color:#0F6E56;margin-top:2px;}
.ibadge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;align-self:flex-start;margin-top:2px;}
.io{background:#FAEEDA;color:#633806;}
.is{background:#E1F5EE;color:#0F6E56;}
textarea{width:100%;border:1px solid #ccc;border-radius:8px;padding:10px 12px;font-size:14px;font-family:sans-serif;min-height:80px;}
.arow{display:flex;gap:8px;margin-top:1.5rem;padding-bottom:2rem;}
.btn-save{flex:1;padding:12px;border-radius:8px;border:1px solid #BA7517;background:#FAEEDA;color:#633806;font-size:15px;font-weight:500;cursor:pointer;}
.btn-clr{padding:12px 16px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#666;font-size:15px;cursor:pointer;}
.empty{text-align:center;padding:3rem 1rem;color:#666;font-size:14px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:white;padding:11px 20px;border-radius:8px;font-size:14px;font-weight:500;opacity:0;transition:opacity .3s;z-index:999;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div><p style="color:#666">Conectando...</p></div></div>
<div class="toast" id="toast"></div>
<script>
const FC={
  apiKey:"AIzaSyBbIbLlphnLjzfsRMG_d7FsoxKnVmUp_Ak",
  authDomain:"opera-9341f.firebaseapp.com",
  databaseURL:"https://opera-9341f-default-rtdb.firebaseio.com",
  projectId:"opera-9341f",
  storageBucket:"opera-9341f.firebasestorage.app",
  messagingSenderId:"17775732362",
  appId:"1:17775732362:web:292e077024610767cf6f73"
};
firebase.initializeApp(FC);
const db=firebase.database();

const STORES=[{id:1,name:'Vila Paraíso',abbr:'VP'},{id:2,name:'PDCJE',abbr:'JE'},{id:3,name:'PDCTQ',abbr:'TQ'},{id:4,name:'PDCTT',abbr:'TT'},{id:5,name:'PDCSLM',abbr:'SL'}];
const MP='1234';
const CL={
  abertura:[
    {s:'Limpeza e higiene',items:[
      {id:'a1',t:'Limpar e higienizar bancadas e superfícies',r:true},
      {id:'a2',t:'Verificar limpeza geral do salão',r:true},
      {id:'a3',t:'Verificar estoque de produtos de limpeza',r:false}
    ]},
    {s:'Equipamentos',items:[
      {id:'a4',t:'Ligar e verificar funcionamento dos fornos',r:true},
      {id:'a5',t:'Verificar temperatura das câmaras frias',r:true},
      {id:'a6',t:'Testar equipamentos de cozinha',r:true},
      {id:'a7',t:'Verificar sistema de caixa e impressora',r:true}
    ]},
    {s:'Produtos e estoque',items:[
      {id:'a8',t:'Conferir produtos no estoque',r:true},
      {id:'a9',t:'Verificar validade dos insumos perecíveis',r:true},
      {id:'a10',t:'Organizar vitrine e exposição',r:true},
      {id:'a11',t:'Preparar troco e conferir fundo de caixa',r:true}
    ]},
    {s:'Equipe e segurança',items:[
      {id:'a12',t:'Conferir escala e presença dos colaboradores',r:true},
      {id:'a13',t:'Verificar EPI e uniforme correto',r:true},
      {id:'a14',t:'Checar alarme e iluminação',r:true},
      {id:'a15',t:'Verificar extintores e saídas de emergência',r:false}
    ]}
  ],
  fechamento:[
    {s:'Caixa e financeiro',items:[
      {id:'f1',t:'Fechar e conferir caixa do dia',r:true},
      {id:'f2',t:'Imprimir relatório de vendas',r:true},
      {id:'f3',t:'Guardar dinheiro no cofre',r:true}
    ]},
    {s:'Produtos',items:[
      {id:'f4',t:'Embalar produtos para amanhã',r:true},
      {id:'f5',t:'Descartar produtos vencidos',r:true},
      {id:'f6',t:'Guardar ingredientes perecíveis',r:true},
      {id:'f7',t:'Registrar produção e sobras',r:false}
    ]},
    {s:'Limpeza',items:[
      {id:'f8',t:'Lavar utensílios, formas e equipamentos',r:true},
      {id:'f9',t:'Limpar fornos e superfícies',r:true},
      {id:'f10',t:'Varrer e lavar o piso',r:true},
      {id:'f11',t:'Limpar banheiros e repor insumos',r:false}
    ]},
    {s:'Segurança e fechamento',items:[
      {id:'f12',t:'Desligar todos os equipamentos',r:true},
      {id:'f13',t:'Verificar torneiras, gás e água',r:true},
      {id:'f14',t:'Apagar luzes e ligar alarme',r:true},
      {id:'f15',t:'Trancar todas as entradas',r:true}
    ]}
  ]
};

let ses=null,tab='abertura',exp={},st={},hist=[],sync='off';

function td(){return new Date().toLocaleDateString('pt-BR');}
function tk(){return td().replace(/\//g,'_');}
function sk(sid,type){return 's'+sid+'_'+type+'_'+tk();}
function ini(n){return n.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function gp(sid,type){
  const k=sk(sid,type);
  if(!st[k])return{done:0,total:0,pct:0};
  const items=CL[type].flatMap(s=>s.items);
  const done=items.filter(i=>st[k].checks&&st[k].checks[i.id]).length;
  return{done,total:items.length,pct:items.length?Math.round(done/items.length*100):0};
}
function ek(sid,type){
  const k=sk(sid,type);
  if(!st[k]){
    st[k]={checks:{},checkedBy:{},obs:''};
    CL[type].forEach(s=>s.items.forEach(i=>{st[k].checks[i.id]=false;}));
  }
}
function toast(msg,ok){
  ok=ok!==false;
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=ok?'#3B6D11':'#A32D2D';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}
function setDot(s){
  sync=s;
  const d=document.getElementById('sdot');
  if(d)d.className='dot'+(s==='off'?' off':s==='sync'?' sync':'');
}
  db.ref('.info/connected').on('value',function(snap){
  setDot(snap.val()?'on':'off');
  if(snap.val()&&!ses){
    STORES.forEach(s=>['abertura','fechamento'].forEach(t=>ek(s.id,t)));
    render();
  }
});

db.ref('state/'+tk()).on('value',function(snap){
  const data=snap.val()||{};
  STORES.forEach(s=>['abertura','fechamento'].forEach(t=>{
    const k=sk(s.id,t);
    if(data[k])st[k]=data[k];
    else ek(s.id,t);
  }));
  if(ses)render();
});

db.ref('history').orderByChild('ts').limitToLast(100).on('value',function(snap){
  const data=snap.val()||{};
  hist=Object.values(data).sort((a,b)=>b.ts-a.ts);
  if(ses&&tab==='historico')render();
});

async function save(k){
  setDot('sync');
  try{await db.ref('state/'+tk()+'/'+k).set(st[k]);setDot('on');}
  catch(e){setDot('off');toast('Erro ao sincronizar',false);}
}
async function push(entry){
  setDot('sync');
  try{await db.ref('history').push(entry);setDot('on');}
  catch(e){setDot('off');}
}

function render(){
  if(!ses)renderLogin();
  else if(ses.type==='master')renderMaster();
  else renderStore();
}

function renderLogin(){
  document.getElementById('app').innerHTML=
    '<div class="login-wrap"><div class="card">'+
    '<div class="logo"><h1>Checklist Operacional</h1><p>Identifique-se para continuar</p></div>'+
    '<div class="field"><label>Seu nome completo</label><input id="ln" type="text" placeholder="Ex: Maria Silva"/></div>'+
    '<div class="field"><label>Loja</label><select id="ls"><option value="">Selecione...</option>'+
    STORES.map(s=>'<option value="'+s.id+'">'+s.name+'</option>').join('')+'</select></div>'+
    '<div class="field"><label>Turno</label><select id="lt"><option value="abertura">Abertura</option><option value="fechamento">Fechamento</option></select></div>'+
    '<button class="btn btn-amber" onclick="doLogin()">Entrar no checklist</button>'+
    '<div class="err" id="lerr"></div>'+
    '<div class="divider"><span>acesso gerencial</span></div>'+
    '<div class="field"><label>Senha do gestor geral</label><input id="lm" type="password" placeholder="Senha master"/></div>'+
    '<button class="btn btn-gray" onclick="doMaster()">Entrar como gestor geral</button>'+
    '</div></div>';
}

function doLogin(){
  const name=document.getElementById('ln').value.trim();
  const sid=parseInt(document.getElementById('ls').value);
  const type=document.getElementById('lt').value;
  const err=document.getElementById('lerr');
  if(!name){err.textContent='Digite seu nome.';return;}
  if(!sid){err.textContent='Selecione a loja.';return;}
  ses={name:name,storeId:sid,type:'store',turno:type};
  tab=type;render();
}
function doMaster(){
  const pw=document.getElementById('lm').value;
  if(pw!==MP){document.getElementById('lerr').textContent='Senha incorreta.';return;}
  ses={name:'Gestor Geral',type:'master'};tab='overview';render();
}
function doLogout(){ses=null;render();}

function renderMaster(){
  const today=td();
  let tD=0,tI=0,sC=0;
  STORES.forEach(s=>{
    ['abertura','fechamento'].forEach(t=>{const p=gp(s.id,t);tD+=p.done;tI+=p.total;});
    if(gp(s.id,'abertura').pct===100&&gp(s.id,'fechamento').pct===100)sC++;
  });
  const gP=tI?Math.round(tD/tI*100):0;

  let storesHTML='';
  STORES.forEach(s=>{
    const pa=gp(s.id,'abertura'),pf=gp(s.id,'fechamento');
    const all=pa.pct===100&&pf.pct===100,any=pa.done>0||pf.done>0;
    const bc=all?'b-done':any?'b-part':'b-none';
    const bl=all?'Completo':any?'Em andamento':'Pendente';
    const isO=exp[s.id];
    storesHTML+='<div class="sstore"><div class="sstore-h" onclick="toggleExp('+s.id+')">'+
      '<div class="av">'+s.abbr+'</div>'+
      '<div class="si"><div class="sn">'+s.name+'</div><div class="ss">Abert. '+pa.done+'/'+pa.total+' · Fech. '+pf.done+'/'+pf.total+'</div></div>'+
      '<div class="badges"><span class="badge '+bc+'">'+bl+'</span></div></div>'+
      '<div class="sstore-d '+(isO?'op':'')+'">'+
      '<div class="drow"><span class="dt">Abertura</span><div class="mbar"><div class="mt"><div class="mf '+(pa.pct===100?'mf-g':pa.pct>0?'mf-a':'')+'" style="width:'+pa.pct+'%"></div></div><span class="mp">'+pa.pct+'%</span></div></div>'+
      '<div class="drow"><span class="dt">Fechamento</span><div class="mbar"><div class="mt"><div class="mf '+(pf.pct===100?'mf-g':pf.pct>0?'mf-a':'')+'" style="width:'+pf.pct+'%"></div></div><span class="mp">'+pf.pct+'%</span></div></div>'+
      '</div></div>';
  });

  document.getElementById('app').innerHTML=
    '<div class="app"><div class="header">'+
    '<div><h2>Painel Geral</h2><p>'+today+'</p></div>'+
    '<div class="header-right"><div id="sdot" class="dot '+(sync==='off'?'off':sync==='sync'?'sync':'')+'"></div>'+
    '<span class="pill">Gestor Geral</span><button class="btn-sm" onclick="doLogout()">Sair</button></div></div>'+
    '<div class="grid3">'+
    '<div class="scard"><div class="sl">Lojas completas</div><div class="sv">'+sC+'/5</div></div>'+
    '<div class="scard"><div class="sl">Itens</div><div class="sv">'+tD+'/'+tI+'</div></div>'+
    '<div class="scard"><div class="sl">Progresso</div><div class="sv">'+gP+'%</div></div>'+
    '</div>'+storesHTML+'</div>';
}

function toggleExp(id){exp[id]=!exp[id];renderMaster();}
  function renderStore(){
  const s=STORES.find(x=>x.id===ses.storeId);
  const k=sk(s.id,tab);
  const p=gp(s.id,tab);

  let itemsHTML='';
  CL[tab].forEach(sec=>{
    itemsHTML+='<div class="sec"><div class="sec-t">'+sec.s+'</div>';
    sec.items.forEach(item=>{
      const chk=st[k]&&st[k].checks&&st[k].checks[item.id];
      const who=st[k]&&st[k].checkedBy?st[k].checkedBy[item.id]:'';
      itemsHTML+='<div class="item '+(chk?'chk':'')+'" onclick="toggleItem(\''+item.id+'\')">'+
        '<div class="cb2"><div class="ci"></div></div>'+
        '<div class="ib"><div class="it">'+item.t+'</div>'+(chk&&who?'<div class="iw">marcado por '+who+'</div>':'')+'</div>'+
        '<span class="ibadge '+(item.r?'io':'is')+'">'+(item.r?'obrigatório':'segurança')+'</span></div>';
    });
    itemsHTML+='</div>';
  });

  document.getElementById('app').innerHTML=
    '<div class="app"><div class="header">'+
    '<div><h2>'+s.name+'</h2><p>'+td()+'</p></div>'+
    '<div class="header-right"><div id="sdot" class="dot '+(sync==='off'?'off':sync==='sync'?'sync':'')+'"></div>'+
    '<span class="pill">'+ses.name+'</span><button class="btn-sm" onclick="doLogout()">Sair</button></div></div>'+
    '<div class="tabs">'+
    '<button class="tab '+(tab==='abertura'?'on':'')+'" onclick="setTab(\'abertura\')">Abertura</button>'+
    '<button class="tab '+(tab==='fechamento'?'on':'')+'" onclick="setTab(\'fechamento\')">Fechamento</button>'+
    '</div>'+
    '<div class="prog"><div class="prog-top"><span class="prog-l">Progresso</span><span class="prog-n">'+p.done+' / '+p.total+'</span></div>'+
    '<div class="ptrack"><div class="pfill '+(p.pct===100?'done':'')+'" style="width:'+p.pct+'%"></div></div></div>'+
    itemsHTML+
    '<div class="sec"><div class="sec-t">Observações do turno</div>'+
    '<textarea placeholder="Registre ocorrências..." oninput="updateObs(this.value)">'+(st[k]&&st[k].obs?st[k].obs:'')+'</textarea></div>'+
    '<div class="arow"><button class="btn-save" onclick="salvar()">Salvar registro</button>'+
    '<button class="btn-clr" onclick="limpar()">Limpar meus itens</button></div></div>';
}

function setTab(t){tab=t;renderStore();}

async function toggleItem(id){
  const k=sk(ses.storeId,tab);
  if(!st[k])return;
  const cur=st[k].checks[id]||false;
  st[k].checks[id]=!cur;
  if(!cur)st[k].checkedBy[id]=ses.name;
  else delete st[k].checkedBy[id];
  renderStore();
  await save(k);
}

function updateObs(val){
  const k=sk(ses.storeId,tab);
  if(!st[k])return;
  st[k].obs=val;
  clearTimeout(window._ot);
  window._ot=setTimeout(()=>save(k),800);
}

async function salvar(){
  const s=STORES.find(x=>x.id===ses.storeId);
  const k=sk(s.id,tab);
  const items=CL[tab].flatMap(x=>x.items);
  const done=items.filter(i=>st[k]&&st[k].checks[i.id]).length;
  await push({ts:Date.now(),store:s.name,storeId:s.id,turno:tab,date:td(),
    time:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
    done:done,total:items.length,colaborador:ses.name,obs:st[k]&&st[k].obs?st[k].obs:''});
  toast('Registro salvo!');
}

async function limpar(){
  const k=sk(ses.storeId,tab);
  if(!st[k])return;
  CL[tab].flatMap(s=>s.items).filter(i=>st[k].checkedBy&&st[k].checkedBy[i.id]===ses.name)
    .forEach(i=>{st[k].checks[i.id]=false;delete st[k].checkedBy[i.id];});
  await save(k);renderStore();
}
</script>
